
<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; }

.demo-wrap {

}

.phone-frame {

.wa-header {

}
.wa-avatar {

.wa-header-info { flex: 1; }

.wa-header-icons { display: flex; gap: 16px; }

.wa-chat-area {

.date-label {

.date-label span {

.msg-row { display: flex; margin: 1px 0; }

.bubble {

}
.bubble.out {
  background: var(--wa-bubble-out);

}
.bubble.in {

.list-card {

.wa-send-btn {

</style>

<script>
const chat = document.getElementById('chat-area');
const statusText = document.getElementById('status-text');

const stepInfos = [
  '<strong>Step 1 — Welcome</strong><br>Bot sends greeting + language list. WhatsApp List Message format: title ≤24 chars, description ≤72 chars.',
  '<strong>Step 2 — Language selected</strong><br>User taps a language. Bot confirms and sends intent menu in the chosen language.',
  '<strong>Step 3 — Intent selected</strong><br>User picks Learn / Buy / Ask. Bot routes to the correct path immediately.',
  '<strong>Step 4 — Learn path</strong><br>Claude Haiku explains term insurance in the user\'s language. max_tokens=800, temp=0.3.',
  '<strong>Step 5 — Dynamic follow-ups</strong><br>After every AI reply, a second Claude call picks 4 relevant seed questions + 1–2 contextual ones.',
  '<strong>Step 6 — Buy path: data collection</strong><br>Bot asks 9 questions one-by-one: Name → Age → Profession → Dependents → Income → Loans → Obligations → Expenses → Budget.',
  '<strong>Step 7 — Plan recommendations</strong><br>AI picks 3 best plans from 8 options based on collected profile. Shows premium, CSR, and buy link.',
  '<strong>Step 8 — Agent handoff</strong><br>User confirms interest. Bot hands off to licensed IRDAI agent with full profile summary.'
];

function scrollBottom() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function addMsg(html, type='in', delay=0) {
  return new Promise(res => {
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = 'msg-row ' + type;
      row.innerHTML = html;
      chat.appendChild(row);
      scrollBottom();
      res();
    }, delay);
  });
}

function makeBubble(text, type, ticks=true) {
  const tickHtml = type==='out' && ticks ? '<span class="ticks">✓✓</span>' : '';
  return `<div class="bubble ${type}"><div>${text}</div><div class="time-row"><span class="time">10:${String(Math.floor(Math.random()*59)).padStart(2,'0')} AM</span>${tickHtml}</div></div>`;
}

function makeListCard(header, body, options, btnLabel='Choose an option') {
  let opts = options.map((o,i) => `
    <div class="list-option" onclick="selectOption(this, '${o.title}', ${o.step !== undefined ? o.step : 'null'})">
      <div class="list-option-title">${o.title}</div>
      <div class="list-option-desc">${o.desc}</div>
    </div>
    ${i < options.length-1 ? '<div class="list-divider"></div>' : ''}
  `).join('');
  return `<div class="list-card">
    <div class="list-card-header">${header}</div>
    <div class="list-card-body">${body}</div>
    <div class="list-divider"></div>
    ${opts}
    <div class="list-btn"><i class="ti ti-list" aria-hidden="true"></i> ${btnLabel}</div>
  </div>`;
}

function showTyping(ms=1200) {
  statusText.textContent = 'typing...';
  const row = document.createElement('div');
  row.className = 'msg-row in';
  row.id = 'typing-row';
  row.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chat.appendChild(row);
  scrollBottom();
  return new Promise(res => setTimeout(() => {
    const t = document.getElementById('typing-row');
    if(t) t.remove();
    statusText.textContent = 'online';
    res();
  }, ms));
}

let currentStep = 0;

function selectOption(el, title, nextStep) {
  const card = el.closest('.list-card');
  if(!card) return;
  const row = card.closest('.msg-row');
  if(!row) return;
  row.innerHTML = makeBubble(`<span class="selected-option"><i class="ti ti-check" aria-hidden="true"></i> ${title}</span>`, 'out');
  scrollBottom();
  if(nextStep !== null && nextStep !== undefined) {
    setTimeout(() => goToStep(nextStep), 500);
  }
}

async function clearAndBuild(step) {
  chat.innerHTML = '<div class="date-label"><span>Today</span></div>';
  currentStep = step;
  document.querySelectorAll('.step-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.step) === step);
  });
  document.getElementById('step-info').innerHTML = stepInfos[step];
